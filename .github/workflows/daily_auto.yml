name: ⚡ Fast Gemini Web Project

on:
  workflow_dispatch: # Bash tlanciha b yddik

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Install Gemini Library
        run: pip install google-genai

      - name: 🧠 Generate Project (Gemini Only)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: 🚀 Create New Repository & Upload
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # 1. Nsawbo smiya l-Repo b t-tarikh w s-sa3a bash tkon unique
          REPO_NAME="Gemini-WebApp-$(date +'%Y%m%d-%H%M%S')"
          echo "Jari incha2 repository: $REPO_NAME"
          
          # 2. N-creyiw l-repo f GitHub (Public)
          gh repo create ${{ github.repository_owner }}/$REPO_NAME --public --description "A complete web application entirely generated by Google Gemini"
          
          # 3. N-jm3ow les fichiers jdad (index.html w README) f blassa w n-pushiwhom
          mkdir deploy_folder
          cd deploy_folder
          git init
          cp ../index.html .
          cp ../README.md .
          
          git add .
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "🚀 Initial Commit: Full web app completely generated by Gemini"
          
          # 4. Tla3 l-khedma l-Repo j-jdida
          git remote add origin https://${GH_TOKEN}@[github.com/$](https://github.com/$){{ github.repository_owner }}/$REPO_NAME.git
          git branch -M main
          git push -u origin main
          
          echo "✅ L-Projet l-jdid dyalk t-publiya hna: [https://github.com/$](https://github.com/$){{ github.repository_owner }}/$REPO_NAME"
