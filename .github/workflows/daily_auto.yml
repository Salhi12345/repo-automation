name: 🚀 Pro AI Project Generator Pipeline

on:
  workflow_dispatch: # Khassk t-klicki 'Run workflow' bash tlanciha
  schedule:
    - cron: '0 8 * * 1' # Kat-runna awtomatikiya kola tnin m3a 8 dyal sba7 (ila bghiti)

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout main repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Install AI Dependencies
        run: pip install google-genai openai

      - name: 🧠 Run AI Engine (Gemini + DeepSeek)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: python main.py

      - name: 🚀 Create New Pro Repository & Push Code
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # 1. Smiya dyal l-repo b format professionnel
          REPO_NAME="Pro-AI-App-$(date +'%Y-%m-%d-%H%M')"
          
          # 2. N-creyiw l-repo f GitHub (Public)
          gh repo create ${{ github.repository_owner }}/$REPO_NAME --public --description "A massive professional web app automatically generated by Gemini & DeepSeek"
          
          # 3. Nwjdo les fichiers w n-pushiwhom
          mkdir temp_deploy
          cd temp_deploy
          git init
          cp ../index.html .
          cp ../README.md .
          
          git add .
          git config user.name "AI Auto-Developer Bot"
          git config user.email "bot@ai-automation.local"
          git commit -m "🎉 Initial Pro Commit: Full architecture and code generated by AI"
          
          # 4. Pushing l-repo l-jdida
          git remote add origin https://${GH_TOKEN}@github.com/${{ github.repository_owner }}/$REPO_NAME.git
          git branch -M main
          git push -u origin main
          
          echo "✅ L-Projet l-kbir t-publiya f: https://github.com/${{ github.repository_owner }}/$REPO_NAME"
